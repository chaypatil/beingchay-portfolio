<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>beingchay</title>
    <meta name="description" content="Three connected projects by Chay: fallout, ANRXYST, and C2X.">
    <link rel="preload" as="image" href="assets/central-light-hero.png" fetchpriority="high">
    <link rel="stylesheet" href="home.css">
  </head>
  <body>
    <main class="constellation" aria-labelledby="home-title">
      <h1 id="home-title" class="visually-hidden">beingchay projects</h1>

      <section class="constellation-scene" aria-describedby="interaction-note">
        <img
          class="light-field"
          src="assets/central-light-hero.png"
          alt=""
          width="1728"
          height="960"
          decoding="async"
          fetchpriority="high"
        >

        <button
          class="light-trigger"
          type="button"
          aria-label="Bring the projects closer"
          aria-pressed="false"
        ></button>

        <nav class="project-orbit" aria-label="Projects">
          <a class="project-link project-link-right" href="https://fall0ut.in" rel="external">
            <span>fallØut</span>
          </a>
          <a class="project-link project-link-top" href="c2x/">
            <span>C2X</span>
          </a>
          <a class="project-link project-link-left" href="anrxyst.html">
            <span>ANRXYST</span>
          </a>
        </nav>

        <p id="interaction-note" class="visually-hidden">
          Scroll in either direction or activate the central light to bring the project links into focus.
        </p>
      </section>

      <div class="departure-flare" aria-hidden="true"></div>
    </main>

    <script type="module" src="home.js"></script>
  </body>
</html>
